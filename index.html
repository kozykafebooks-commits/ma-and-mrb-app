<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MA & MR. B</title>
    <style>
        body { background-color: #070707; color: white; font-family: Helvetica; text-align: center; }
        #userInput { width: 80%; height: 60px; background: #1a1a1a; color: white; border: 1px solid #48423f; margin-top: 20px; }
        button { background: #ca112c; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    
    <h1>MA & MR. B</h1>
    
    <textarea id="userInput" placeholder="Talk to me..."></textarea>
    <br>
    <button onclick="sendMessage()">SEND ✦</button>

    <script>
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const userText = inputField.value.trim();
        if (!userText) return;
        
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                   'Authorization': 'Bearer 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'                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are MA or MR. B. Raw and unfiltered." },
                        { role: "user", content: userText }
                    ]
                })
            });
            
            const data = await response.json();
            alert(data.choices[0].message.content);
        } catch (err) {
            alert("Error: Check your API key or console.");
        }
    }
    </script>
</body>
</html>
