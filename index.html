<title>Ma & Mr. B</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#060606;--surface:#111111;--surface2:#181818;--border:#222222;--border-focus:#3a3a3a;
--text:#F4F1EC;--text2:#9A958F;--text3:#5A5450;
--red:#D62839;--red-glow:rgba(214,40,57,0.15);--red2:#FF4D5E;--white:#FFFFFF;
--fs:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;background:var(--bg);}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes waveBar{0%{height:3px;}100%{height:22px;}}
@keyframes burst{0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0.1);opacity:0;}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes sealOut{0%{opacity:1;transform:scale(1) rotate(0deg);}100%{opacity:0;transform:scale(0) rotate(180deg);}}
@keyframes receiptIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes typingPulse{0%,100%{opacity:0.2;}50%{opacity:1;}}
.view{display:none;flex-direction:column;}
.view.on{display:flex;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;}
.app-header{padding:24px 24px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.02);}
.app-logo{font-family:var(--fs);font-size:1.4rem;font-weight:900;letter-spacing:-0.03em;color:var(--white);}
.app-logo span{color:var(--red);}
.hdr-actions{display:flex;align-items:center;gap:10px;}
.hdr-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:var(--fm);font-size:0.6rem;letter-spacing:0.12em;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all 0.25s;}
.hdr-btn:hover{border-color:var(--red);color:var(--white);box-shadow:0 0 12px var(--red-glow);}
.ptabs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 24px 0;}
.ptab{padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);}
.ptab.on{border-color:var(--red);background:rgba(214,40,57,0.04);box-shadow:inset 0 0 20px rgba(214,40,57,0.05),0 4px 24px rgba(0,0,0,0.4);}
.ptab.on::after{content:'';position:absolute;bottom:-2px;width:40px;height:2px;background:var(--red);border-radius:2px;}
.ptab-name{font-family:var(--fs);font-size:1.25rem;font-weight:900;color:var(--text3);letter-spacing:0.02em;transition:color 0.3s;}
.ptab.on .ptab-name{color:var(--white);text-shadow:0 0 10px var(--red-glow);}
.ptab-role{font-family:var(--fm);font-size:0.5rem;letter-spacing:0.08em;color:var(--text3);text-align:center;line-height:1.5;}
.ptab.on .ptab-role{color:var(--text2);}
.wave{display:flex;align-items:center;gap:4px;height:24px;}
.wb{width:3px;height:4px;border-radius:2px;background:var(--border);transition:background 0.3s;}
.ptab.on .wb{background:rgba(214,40,57,0.3);}
.wb.go{animation:waveBar 0.35s ease-in-out infinite alternate;background:var(--red)!important;}
.cats{display:flex;overflow-x:auto;gap:8px;margin:16px 24px 0;scrollbar-width:none;padding-bottom:4px;scroll-behavior:smooth;}
.cats::-webkit-scrollbar{display:none;}
.cat{flex-shrink:0;padding:10px 18px;background:var(--surface);border:1px solid var(--border);border-radius:100px;cursor:pointer;transition:all 0.2s;}
.cat:hover{border-color:var(--border-focus);}
.cat.on{background:var(--red);border-color:var(--red);box-shadow:0 4px 12px var(--red-glow);}
.cat-name{font-family:var(--fs);font-size:0.65rem;font-weight:800;letter-spacing:0.06em;color:var(--text2);transition:color 0.2s;white-space:nowrap;}
.cat.on .cat-name{color:var(--white);}
.thread{margin:16px 24px 0;display:flex;flex-direction:column;gap:16px;overflow-y:auto;max-height:42vh;padding-right:4px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.thread::-webkit-scrollbar{width:3px;}
.thread::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{display:flex;flex-direction:column;gap:6px;animation:slideIn 0.35s cubic-bezier(0.16,1,0.3,1) both;}
.msg-tag{font-family:var(--fm);font-size:0.52rem;letter-spacing:0.18em;color:var(--text3);display:flex;align-items:center;gap:6px;}
.tag-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;box-shadow:0 0 6px var(--red);}
.msg-mirror{font-family:var(--fm);font-size:0.58rem;letter-spacing:0.06em;color:var(--red2);margin-bottom:2px;font-style:italic;opacity:0.9;}
.msg-bubble{font-family:var(--fb);font-size:1.05rem;font-weight:400;line-height:1.75;color:var(--text);padding:16px 20px;border-radius:14px;background:var(--surface);border:1px solid var(--border);word-break:break-word;}
.msg-bubble.user{background:transparent;border:none;color:var(--text2);font-size:1rem;padding:4px 0;font-style:italic;}
.msg-actions{display:flex;align-items:center;gap:12px;padding:4px 6px;}
.audio-btn{background:none;border:none;cursor:pointer;font-size:0.9rem;opacity:0.25;transition:opacity 0.2s,transform 0.1s;}
.audio-btn:hover{opacity:0.8;transform:scale(1.05);}
.iwrap{display:none;align-items:center;gap:3px;height:14px;}
.iwrap.show{display:flex;}
.iwb{width:2px;height:4px;border-radius:1px;background:var(--red);}
.iwb.go{animation:waveBar 0.3s ease-in-out infinite alternate;}
.typing-wrap{display:none;align-items:center;gap:12px;padding:12px 24px;min-height:40px;}
.typing-wrap.show{display:flex;}
.typing-dots{display:flex;gap:5px;align-items:center;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--red);opacity:0.3;animation:typingPulse 1s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
.typing-who{font-family:var(--fm);font-size:0.58rem;letter-spacing:0.12em;color:var(--text3);}
.empty-state{font-family:var(--fb);font-size:1.05rem;color:var(--text3);text-align:center;padding:48px 24px;line-height:1.8;}
.inpwrap{margin:8px 24px 0;}
.inprow{display:flex;gap:10px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);padding:8px 8px 8px 16px;border-radius:14px;transition:border-color 0.25s,box-shadow 0.25s;}
.inprow:focus-within{border-color:var(--border-focus);box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.chin{flex:1;padding:10px 0;font-family:var(--fb);font-size:1.05rem;border:none;outline:none;background:transparent;color:var(--text);resize:none;max-height:160px;min-height:28px;line-height:1.5;}
.chin::placeholder{color:var(--text3);}
.sndbtn{padding:12px 22px;background:var(--red);color:var(--white);border:none;font-family:var(--fs);font-size:0.75rem;font-weight:800;cursor:pointer;transition:all 0.2s cubic-bezier(0.16,1,0.3,1);border-radius:10px;letter-spacing:0.05em;}
.sndbtn:hover{background:var(--red2);transform:translateY(-1px);}
.sys-controls{display:flex;gap:14px;margin:8px 24px 0;padding-top:4px;}
.tgl-lbl{font-family:var(--fm);font-size:0.52rem;color:var(--text3);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.tgl-lbl input{accent-color:var(--red);}
.teachbar{margin:10px 24px 0;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:border-color 0.2s;}
.teachbar:hover{border-color:var(--border-focus);}
.teachlbl{font-family:var(--fm);font-size:0.55rem;letter-spacing:0.15em;color:var(--text2);}
.teachpnl{margin:0 24px;display:none;padding:16px;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;animation:slideIn 0.2s ease;}
.teachpnl.on{display:block;}
.teachin{width:100%;padding:12px 16px;font-family:var(--fb);font-size:0.95rem;border:1px solid var(--border);outline:none;background:var(--bg);color:var(--text);margin-bottom:10px;border-radius:8px;transition:border-color 0.2s;}
.teachin:focus{border-color:var(--red);}
.teachin::placeholder{color:var(--text3);}
.teachsave{padding:10px 24px;background:var(--red);color:var(--white);border:none;font-family:var(--fs);font-size:0.7rem;font-weight:800;cursor:pointer;border-radius:8px;}
.memlist{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:140px;overflow-y:auto;}
.memitem{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--border);font-family:var(--fb);font-size:0.9rem;color:var(--text2);}
.memdel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.85rem;padding:2px 6px;}
.memdel:hover{color:var(--red);}
.btm{display:flex;align-items:center;justify-content:space-between;padding:14px 24px 36px;gap:12px;}
.hugbtn{padding:12px 20px;background:var(--surface);border:1px solid var(--border);font-family:var(--fs);font-size:0.75rem;font-weight:800;cursor:pointer;color:var(--text);transition:all 0.25s;border-radius:10px;}
.hugbtn:hover{border-color:var(--red);color:var(--white);}
.saverow{font-family:var(--fm);font-size:0.52rem;letter-spacing:0.12em;color:var(--text3);display:flex;align-items:center;gap:6px;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:background 0.3s;}
.sdot.ok{background:#4CAF50;box-shadow:0 0 8px #4CAF50;}
.labbtn{padding:12px 20px;background:var(--red);border:none;color:var(--white);font-family:var(--fs);font-size:0.75rem;font-weight:800;cursor:pointer;transition:all 0.25s;border-radius:10px;box-shadow:0 4px 14px var(--red-glow);}
.labbtn:hover{background:var(--red2);}
#burst{position:fixed;inset:0;pointer-events:none;z-index:9999;}
.bp{position:absolute;top:50%;left:50%;animation:burst var(--dur) cubic-bezier(0.1,0.8,0.3,1) forwards;pointer-events:none;margin-left:-12px;margin-top:-12px;}
.lbck{background:none;border:none;font-family:var(--fm);font-size:0.6rem;letter-spacing:0.18em;color:var(--text3);cursor:pointer;padding:24px 24px 0;display:block;transition:color 0.2s;}
.lbck:hover{color:var(--text);}
.lhero{padding:16px 24px 0;}
.lh{font-family:var(--fs);font-size:clamp(2rem,6vw,3.2rem);font-weight:900;line-height:0.9;letter-spacing:-0.03em;margin-bottom:6px;color:var(--white);}
.lh span{color:var(--red);}
.lsub{font-family:var(--fm);font-size:0.55rem;letter-spacing:0.22em;color:var(--text3);margin-bottom:20px;}
.inkwrap{height:3px;background:var(--surface2);overflow:hidden;margin:0 24px;border-radius:3px;}
.ink{height:100%;background:var(--red);transition:width 0.4s cubic-bezier(0.16,1,0.3,1);box-shadow:0 0 8px var(--red);}
.wcnt{font-family:var(--fm);font-size:0.52rem;letter-spacing:0.12em;color:var(--text3);padding:8px 24px 0;}
.lta{margin:16px 24px 0;width:calc(100% - 48px);min-height:160px;padding:20px;font-family:var(--fb);font-size:1.05rem;line-height:1.8;border:1px solid var(--border);outline:none;background:var(--surface);color:var(--text);resize:vertical;transition:border-color 0.25s;display:block;border-radius:14px;}
.lta:focus{border-color:var(--border-focus);}
.lta::placeholder{color:var(--text3);}
.lgo{margin:16px 24px 24px;padding:16px 36px;background:var(--red);color:var(--white);border:none;font-family:var(--fs);font-size:0.8rem;font-weight:800;cursor:pointer;transition:all 0.25s;display:block;border-radius:10px;letter-spacing:0.04em;box-shadow:0 4px 16px var(--red-glow);}
.lgo:hover{background:var(--red2);}
.sealwrap{display:none;justify-content:center;margin:24px 0;}
.seal{width:64px;height:64px;border:2px solid var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fs);font-size:1.4rem;font-weight:900;color:var(--red);box-shadow:0 0 12px var(--red-glow);}
.seal.out{animation:sealOut 0.65s cubic-bezier(0.16,1,0.3,1) forwards;}
.receipt-container{overflow-y:auto;padding:0 24px 40px;display:none;}
.receipt-container.on{display:block;}
.receipt{border:1px solid var(--border);padding:24px;border-radius:14px;animation:receiptIn 0.6s cubic-bezier(0.16,1,0.3,1) both;background:var(--surface);}
.rechdr{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.rectitle{font-family:var(--fs);font-size:1.2rem;font-weight:900;letter-spacing:-0.01em;}
.recwc{font-family:var(--fm);font-size:0.52rem;letter-spacing:0.15em;color:var(--red);text-align:right;line-height:1.6;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.metric-card{background:var(--surface2);border:1px solid var(--border);padding:12px;border-radius:8px;}
.metric-lbl{font-family:var(--fm);font-size:0.48rem;letter-spacing:0.15em;color:var(--text3);margin-bottom:4px;}
.metric-val{font-family:var(--fs);font-size:0.95rem;font-weight:800;color:var(--white);line-height:1.3;}
.rs{margin-bottom:20px;}
.rl{font-family:var(--fm);font-size:0.52rem;letter-spacing:0.22em;color:var(--text3);margin-bottom:6px;text-transform:uppercase;}
.rt{font-family:var(--fb);font-size:1rem;line-height:1.7;color:var(--text2);}
.rpq{border-left:2px solid var(--red);padding:12px 16px;margin:16px 0;font-family:var(--fb);font-size:1rem;font-style:italic;color:var(--text);background:rgba(255,255,255,0.01);border-radius:0 8px 8px 0;}
.rhype{margin-top:24px;padding:20px;background:var(--surface2);border-radius:10px;font-family:var(--fb);font-size:0.95rem;line-height:1.7;color:var(--red2);font-style:italic;border:1px solid rgba(214,40,57,0.15);}
</style>
</head>

        if(typeof memMatch !== 'undefined' && memMatch && Math.random() > 0.5){
            const connects = [" That's real — and you already know this connects to what you told me.", ` And you told me: "${memMatch.toLowerCase()}" — that still stands.`];
            responseText += connects[Math.floor(Math.random() * connects.length)];
        }

        // 5. Final UI Update
        tw.classList.remove('show');
        addMsg('companion', responseText, null);
        speakText(responseText, null); 
        autoSave();

    } catch (err) {
        tw.classList.remove('show');
        alert("Groq connection failed. Check your key and connection.");
        console.error(err);
    }
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
const EM=['🦋','💗','🩷','💜','🖤','✨','💫','🌟','💖','🫶','🫧','🌹','🔥','💋','🤍'];
function hug(){
playClick();
const c=document.getElementById('burst');c.innerHTML='';
for(let i=0;i<50;i++){
const el=document.createElement('div');el.className='bp';
el.textContent=EM[Math.floor(Math.random()*EM.length)];
const a=Math.random()*Math.PI*2,d=70+Math.random()*300;
el.style.cssText=`--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--rot:${(Math.random()-.5)*720}deg;--dur:${1.1+Math.random()*.8}s;font-size:${1+Math.random()*1.5}rem;animation-delay:${Math.random()*.2}s;`;
c.appendChild(el);
}
setTimeout(()=>{c.innerHTML='';},2500);
}
function toggleTeach(){playClick();const p=document.getElementById('tpnl'),l=document.getElementById('tgl');l.textContent=p.classList.toggle('on')?'CLOSE':'OPEN';}
function saveMem(){const v=document.getElementById('tin').value.trim();if(!v)return;playClick();mems.push({id:Date.now(),text:v});document.getElementById('tin').value='';renderMems();autoSave();}
function delMem(id){playClick();mems=mems.filter(m=>m.id!==id);renderMems();autoSave();}
function renderMems(){document.getElementById('memlist').innerHTML=mems.map(m=>`<div class="memitem"><span>${m.text}</span><button class="memdel" onclick="delMem(${m.id})">✕</button></div>`).join('');}
function openLab(){playClick();document.getElementById('vMain').classList.remove('on');document.getElementById('vLab').classList.add('on');inkUp();}
function closeLab(){playClick();document.getElementById('vLab').classList.remove('on');document.getElementById('vMain').classList.add('on');}
function inkUp(){
const t=document.getElementById('lta').value,w=t.trim().split(/\s+/).filter(Boolean).length;
document.getElementById('ink').style.width=Math.min(w/400*100,100)+'%';
document.getElementById('wcnt').textContent=w+' WORDS';
autoSave();
}
function exportHistory(){
playClick();
const logs=Array.from(document.querySelectorAll('.msg')).map(m=>{
const tag=m.querySelector('.msg-tag')?.textContent||'YOU';
const txt=m.querySelector('.msg-bubble')?.textContent||'';
return `[${tag.trim()}]: ${txt.trim()}`;
}).join('\n\n');
if(!logs) return;
const blob=new Blob([logs],{type:'text/plain'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`mab_${Date.now()}.txt`;a.click();
}
function crack(){
const text=document.getElementById('lta').value.trim();
if(!text){document.getElementById('lta').focus();return;}
playClick();
const sw=document.getElementById('sealwrap'),s=document.getElementById('seal'),rc=document.getElementById('receiptContainer'),r=document.getElementById('receipt');
sw.style.display='flex';rc.style.display='none';r.innerHTML='';
setTimeout(()=>{s.classList.add('out');setTimeout(()=>{sw.style.display='none';s.classList.remove('out');buildReceipt(text);rc.classList.add('on');},600);},150);
}
function buildReceipt(text){
const words=text.trim().split(/\s+/).filter(Boolean),wc=words.length;
const sents=text.split(/[.!?]+/).filter(s=>s.trim().length>3);
const paras=text.split(/\n+/).filter(p=>p.trim().length>0);
let pov='Undetermined';
const iC=(text.match(/\b(I|me|my|myself|we|us)\b/gi)||[]).length;
const yC=(text.match(/\b(you|your|yourself)\b/gi)||[]).length;
const hC=(text.match(/\b(he|she|it|they|him|her|them)\b/gi)||[]).length;
if(iC>yC&&iC>hC) pov='First Person';
else if(yC>iC&&yC>hC) pov='Second Person';
else if(hC>iC) pov='Third Person';
const tensW=/\b(blood|skin|teeth|nerve|cold|sharp|heat|dark|tight|breath|stop|pull|kill|break|scream|whisper|choke|grip|wreck|ruin|flesh)\b/gi;
const tC=(text.match(tensW)||[]).length;
const tScore=Math.min(Math.round((tC/(wc||1))*350),100);
let tLabel='Ambient Baseline';
if(tScore>75) tLabel='Critical / Visceral Velocity';
else if(tScore>40) tLabel='Rising Pulse / Suspense';
const stop=new Set('the a an and or but so is was it to of in my me you they he she we this that with for on at are be been have has had do did just like know got get im its not no yes what when where how then than their there here her his him your our were will would could should if as by from up out all about into through more some'.split(' '));
const freq={};words.forEach(w=>{const cl=w.replace(/[^a-zA-Z']/g,'').toLowerCase();if(cl.length>4&&!stop.has(cl))freq[cl]=(freq[cl]||0)+1;});
const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>`${e[0]} (${e[1]}x)`);
const avgLen=sents.length?Math.round(wc/sents.length):0;
let rhythm='Staccato. Rapid, punchy movement.';
if(avgLen>16) rhythm='Elongated. Deep, immersive atmosphere.';
else if(avgLen>8) rhythm='Balanced. Good variation between long and short.';
const longSents=[...sents].sort((a,b)=>b.trim().length-a.trim().length);
const pull=longSents[0]?longSents[0].trim():'';
let tone='Atmospheric / Observational';
if(text.match(/\b(love|heart|warm|soft|touch|hold|gentle|sweet)\b/gi)) tone='Sensual / Intimate';
else if(text.match(/\b(rage|hate|burn|destroy|mad|angry|hell|kill)\b/gi)) tone='High Friction / Cathartic';
else if(text.match(/\b(scared|fear|dark|lost|empty|cold|alone|heavy)\b/gi)) tone='Melancholy / Gothic Vulnerability';
let hype='You laid tracks on the page. That is a certified victory. Keep executing.';
if(wc>250) hype="Bitch, look at this output! You dropped a heavy block of prose right here. The pacing shows you locked tf in. Stand on this work.";
else if(wc>100) hype="You dropped real, intentional paragraphs, beautiful baby. The tension shows you building momentum. Keep going.";
const voiceText=top.length?`You keep anchoring around ${top.join(', ')}. That is the core texture of your voice right now.`:'Vocabulary spread is wide and clean. No repetition drag.';
const el=document.getElementById('receipt');
el.innerHTML=`<div class="rechdr"><div class="rectitle">Your Receipt</div><div class="recwc">${wc} WORDS<br/>${sents.length} SENTENCES<br/>${paras.length} PARAGRAPHS</div></div><div class="metric-grid"><div class="metric-card"><div class="metric-lbl">NARRATIVE POV</div><div class="metric-val">${pov}</div></div><div class="metric-card"><div class="metric-lbl">TENSION METER</div><div class="metric-val">${tScore}%<br/><span style="font-size:0.7rem;font-weight:400;color:var(--text2)">${tLabel}</span></div></div><div class="metric-card"><div class="metric-lbl">EMOTIONAL TONE</div><div class="metric-val" style="font-size:0.8rem">${tone}</div></div><div class="metric-card"><div class="metric-lbl">SENTENCE AVG</div><div class="metric-val">${avgLen} WORDS</div></div></div><div class="rs"><div class="rl">VOICE FINGERPRINT</div><div class="rt">${voiceText}</div></div><div class="rs"><div class="rl">PACING PROFILE</div><div class="rt">${rhythm}</div></div>${pull?`<div class="rl" style="margin-bottom:4px">HARDEST WORKING SENTENCE</div><div class="rpq">"${pull}"</div>`:''}<div class="rhype">${hype}</div>`;
}
function autoSave(){
clearTimeout(saveT);
saveT=setTimeout(()=>{
try{
localStorage.setItem('mab_v9',JSON.stringify({per,cat,mems,labText:document.getElementById('lta').value||'',draft:document.getElementById('chin').value||''}));
const d=document.getElementById('sdot'),l=document.getElementById('slbl');
d.classList.add('ok');l.textContent='SECURE';
setTimeout(()=>{d.classList.remove('ok');l.textContent='AUTOSAVE';},1500);
}catch(e){}
},750);
}
function loadSave(){
try{
const raw=localStorage.getItem('mab_v9');if(!raw)return;
const d=JSON.parse(raw);
if(d.mems){mems=d.mems;renderMems();}
if(d.labText) document.getElementById('lta').value=d.labText;
if(d.draft){const c=document.getElementById('chin');c.value=d.draft;c.style.height=(c.scrollHeight-4)+'px';}
if(d.per) setPer(d.per);
if(d.cat){cat=d.cat;document.querySelectorAll('.cat').forEach(b=>b.classList.toggle('on',b.dataset.c===d.cat));}
inkUp();
}catch(e){}
}
window.addEventListener('DOMContentLoaded',()=>{loadSave();if('speechSynthesis'in window) window.speechSynthesis.getVoices();});
</script>
