<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MA & MR. B</title>
    <style>
        body { background-color: #070707; color: white; font-family: Helvetica, sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: white; }
        #userInput { 
            width: 80%; 
            height: 100px; 
            background: #1a1a1a; 
            color: white; 
            border: 1px solid #48423f; 
            padding: 10px; 
            margin-bottom: 10px; 
        }
        button { 
            background: #ca112c; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        #responseArea { margin-top: 20px; color: #f1eee7; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h1>MA & MR. B</h1>
    
    <textarea id="userInput" placeholder="Talk to me..."></textarea>
    <br>
    <button onclick="sendMessage()">SEND ✦</button>
    
    <div id="responseArea"></div>

    <script>
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const responseArea = document.getElementById('responseArea');
        const userText = inputField.value.trim();
        
        if (!userText) return;
        
        responseArea.innerText = "Thinking...";

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer YOUR_GROQ_API_KEY_HERE' // REPLACE WITH YOUR ACTUAL KEY
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are MA and MR. B. You are raw, unfiltered, brutally honest, and edgy. You speak directly without corporate AI fluff." },
                        { role: "user", content: userText }
                    ]
                })
            });
            
            const data = await response.json();
            if (data.choices && data.choices.length > 0) {
                responseArea.innerText = data.choices[0].message.content;
            } else {
                responseArea.innerText = "Error: Check your API key.";
            }
        } catch (err) {
            responseArea.innerText = "Error connecting to the lab.";
        }
    }
    </script>
</body>
</html>
